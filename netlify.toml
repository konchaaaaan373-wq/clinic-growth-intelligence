[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Netlify は .ts の Functions を esbuild で自動バンドルします
  node_bundler = "esbuild"

# Functions のパスを先に評価し、SPA fallback より優先させる
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback（React Router 用）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
