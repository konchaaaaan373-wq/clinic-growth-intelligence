[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Netlify は .ts の Functions を esbuild で自動バンドルします
  node_bundler = "esbuild"

# SPA fallback（React Router 用）。
# /.netlify/functions/* は Netlify の予約パスとして先に処理されるため、
# この catch-all では捕捉されず、Functions のルーティングは壊れません。
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
